
name: Deploy to GitHub Pages

on:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v3
        with:
          version:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' 9
      - uses: actions/setup-node@v5
        with:
          node-version:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' '22'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
