name: Deploy to GitHub Pages

on:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' latest

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
