
name: Screenshot and Notify

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright
        run: |
          npm install -g playwright && playwright install
      - name: Capture screenshot
        run: |
          playwright screenshot https://x-template-047.github.io/x-template-047 --path screenshot.png
      - name: Notify Discord
        run: |
          curl -H "Content-Type: application/json" -d '{"content":"New screenshot for x-template-047: <url>"}' ${{ secrets.DISCORD_WEBHOOK }}
      - name: Notify Bluesky
        env:
          BLUESKY_TOKEN: ${{ secrets.BLUESKY_TOKEN }}
        run: |
          echo "Posting to Bluesky..."
